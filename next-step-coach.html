<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Step Coach — Skylight Homes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap');

  :root {
    --green: #1D9E75;
    --dark: #085041;
    --mint: #E1F5EE;
    --mint2: #c2ead9;
    --bg: #f7faf9;
    --text: #0f2d25;
    --mid: #3a6357;
    --light: #6b9e8f;
    --border: #d0e9e0;
    --red: #dc2626;
    --orange: #c2410c;
    --shadow: 0 2px 12px rgba(8,80,65,0.08);
    --shadow-lg: 0 8px 32px rgba(8,80,65,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

  .hdr{background:var(--dark);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .hdr-logo{width:30px;height:30px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .hdr-title{font-family:'DM Serif Display',serif;font-size:17px;letter-spacing:-.02em}
  .hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
  .hdr-right{margin-left:auto;display:flex;gap:8px}
  .btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s;border:none}
  .btn-outline{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)!important;color:#fff}
  .btn-outline:hover{background:rgba(255,255,255,.2)}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover{background:#18886a}
  .btn-green:disabled{opacity:.5;cursor:not-allowed}

  .setup{max-width:460px;margin:56px auto;padding:0 20px}
  .card{background:#fff;border-radius:14px;padding:32px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
  .card h2{font-family:'DM Serif Display',serif;font-size:22px;color:var(--dark);margin-bottom:6px}
  .card p{color:var(--mid);font-size:13px;line-height:1.6;margin-bottom:20px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  .field input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);transition:border-color .2s}
  .field input:focus{outline:none;border-color:var(--green);background:#fff}
  .btn-full{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px;transition:background .2s}
  .btn-full:hover{background:var(--dark)}
  .note{font-size:11px;color:var(--light);margin-top:10px;text-align:center}

  .body{padding:14px;max-width:860px;margin:0 auto}
  .scroll{max-height:calc(100vh - 54px);overflow-y:auto}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .stat{background:#fff;border-radius:9px;padding:12px 15px;border:1px solid var(--border);box-shadow:var(--shadow)}
  .stat-l{font-size:10px;color:var(--light);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .stat-v{font-size:22px;font-weight:700;line-height:1;color:var(--dark)}
  .stat-v.r{color:var(--red)}.stat-v.o{color:var(--orange)}.stat-v.g{color:var(--green)}

  .leads{display:flex;flex-direction:column;gap:10px}
  .lcard{background:#fff;border-radius:11px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,transform .15s}
  .lcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .lhdr{padding:14px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
  .avi{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
  .linfo{flex:1;min-width:0}
  .lname{font-weight:600;font-size:14px}
  .lmeta{font-size:11px;color:var(--light);margin-top:1px}
  .bgs{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
  .b{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;letter-spacing:.03em;text-transform:uppercase}
  .b-s{background:var(--mint);color:var(--dark)}
  .b-src{background:#f0f4ff;color:#3a5aa8}
  .b-ok{background:#f0fdf4;color:#15803d}
  .b-w{background:#fff7ed;color:#c2410c}
  .b-c{background:#fef2f2;color:#dc2626}

  .upill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:18px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
  .upill.critical{background:#fef2f2;color:#dc2626}
  .upill.high{background:#fff7ed;color:#c2410c}
  .upill.medium{background:#fefce8;color:#a16207}
  .upill.low{background:var(--mint);color:var(--dark)}
  .udot{width:5px;height:5px;border-radius:50%;background:currentColor}
  .chev{color:var(--light);font-size:14px;flex-shrink:0;transition:transform .2s}
  .lcard.open .chev{transform:rotate(180deg)}

  .cbody{border-top:1px solid var(--border)}
  .cload{padding:22px;text-align:center;color:var(--light);font-size:13px}
  .spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:7px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cc{padding:16px}

  .ubanner{border-radius:8px;padding:11px 14px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
  .ubanner.critical{background:#fef2f2;border:1px solid #fecaca}
  .ubanner.high{background:#fff7ed;border:1px solid #fed7aa}
  .ubanner.medium{background:#fefce8;border:1px solid #fde68a}
  .ubanner.low{background:var(--mint);border:1px solid var(--mint2)}
  .ui{font-size:17px;flex-shrink:0;margin-top:1px}
  .ut{font-size:13px;line-height:1.5}
  .ut strong{display:block;font-weight:600;margin-bottom:2px}

  .slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--light);margin-bottom:9px}
  .steps{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
  .step{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:7px;background:var(--bg);border:1px solid var(--border)}
  .snum{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .stxt{font-size:13px;line-height:1.5}
  .stxt strong{display:block;font-weight:600;margin-bottom:1px}
  .stxt span{color:var(--mid);font-size:12px}

  .stabs{display:flex;gap:4px;margin-bottom:9px}
  .stab{padding:5px 11px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--mid);font-family:inherit;transition:all .15s}
  .stab.on{background:var(--green);color:#fff;border-color:var(--green)}
  .sbox{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;font-size:13px;line-height:1.6;position:relative;white-space:pre-wrap;word-break:break-word;min-height:60px}
  .cpybtn{position:absolute;top:7px;right:7px;background:#fff;border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--mid);transition:all .15s}
  .cpybtn:hover{background:var(--mint);color:var(--dark);border-color:var(--green)}
  .cpybtn.done{background:var(--green);color:#fff;border-color:var(--green)}

  .logbar{border-top:1px solid var(--border);padding:12px 16px;background:var(--bg)}
  .log-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--light);margin-bottom:7px}
  .logbtns{display:flex;gap:5px;flex-wrap:wrap}
  .lbtn{padding:5px 11px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--mid);font-family:inherit;transition:all .15s}
  .lbtn:hover{background:var(--mint);color:var(--dark);border-color:var(--green)}
  .lbtn.done{background:var(--green);color:#fff;border-color:var(--green)}
  .lbtn:disabled{opacity:.5;cursor:not-allowed}

  .empty{text-align:center;padding:44px 20px;color:var(--light)}
  .empty .ico{font-size:36px;margin-bottom:10px}
  .empty h3{font-size:15px;font-weight:600;color:var(--mid);margin-bottom:5px}
  .errbar{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:9px 13px;border-radius:7px;font-size:13px;margin-bottom:12px;line-height:1.5}

  @media(max-width:580px){.stats{grid-template-columns:repeat(2,1fr)}.body{padding:9px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const S = {
  ck: localStorage.getItem('nsc_ck') || '',
  fk: localStorage.getItem('nsc_fk') || '',
  leads: [], cache: {}, logs: {},
  open: null, stab: {}, loading: false, err: null,
};

// ── PROXY: bypasses FUB CORS ──
const PROXY = 'https://corsproxy.io/?';
async function fubGet(path) {
  const url = 'https://api.followupboss.com/v1' + path;
  const r = await fetch(PROXY + encodeURIComponent(url), {
    headers: { 'Authorization': 'Basic ' + btoa(S.fk + ':') }
  });
  if (!r.ok) throw new Error(`FUB ${r.status} ${r.statusText} — check your API key has People read access`);
  return r.json();
}
async function fubPost(path, body) {
  const url = 'https://api.followupboss.com/v1' + path;
  const r = await fetch(PROXY + encodeURIComponent(url), {
    method: 'POST',
    headers: {
      'Authorization': 'Basic ' + btoa(S.fk + ':'),
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── LOAD LEADS ──
async function loadLeads() {
  S.loading = true; S.err = null; render();
  try {
    const data = await fubGet('/people?limit=50&sort=lastActivityAt&direction=desc');
    const raw = data.people || data._embedded?.people || [];
    S.leads = raw.map(p => {
      const last = p.lastActivityAt || p.updated || null;
      const days = last ? Math.floor((Date.now() - new Date(last)) / 86400000) : 999;
      return {
        id: p.id,
        name: [p.firstName, p.lastName].filter(Boolean).join(' ') || 'Unknown',
        stage: p.stage || 'Unknown',
        source: (p.source || 'Direct').replace(/^.*:\s*/, ''),
        daysSince: days,
        email: p.emails?.[0]?.value || '',
        phone: p.phones?.[0]?.value || '',
      };
    }).sort((a, b) => b.daysSince - a.daysSince);
  } catch(e) {
    S.err = e.message;
  }
  S.loading = false; render();
}

// ── CLAUDE COACHING ──
async function getCoaching(lead) {
  if (S.cache[lead.id]) return S.cache[lead.id];
  const prompt = `You are Next Step Coach — AI coaching for Amin Kuchaki Rafsanjani of Skylight Homes, SF Bay Area South Bay.

LEAD:
Name: ${lead.name} | Stage: ${lead.stage} | Source: ${lead.source}
Days since last contact: ${lead.daysSince}
Phone: ${lead.phone||'not on file'} | Email: ${lead.email||'not on file'}

Return ONLY valid JSON, no markdown fences:
{
  "urgency": "critical"|"high"|"medium"|"low",
  "urgencyReason": "one sentence why",
  "summary": "2-3 sentence plain assessment and risk",
  "steps": [
    {"action": "short title", "why": "one sentence rationale"},
    {"action": "...", "why": "..."},
    {"action": "...", "why": "..."}
  ],
  "scripts": {
    "text": "word-for-word text from Amin, warm, Bay Area specific, soft CTA",
    "email": "Subject: ...\n\nbody here — conversational, professional",
    "voicemail": "20-30 second voicemail script with specific market hook"
  }
}`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': S.ck,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!r.ok) throw new Error(`Claude ${r.status}`);
  const d = await r.json();
  const txt = d.content?.find(b => b.type === 'text')?.text || '{}';
  const clean = txt.replace(/^```[a-z]*\n?/, '').replace(/\n?```$/, '').trim();
  const result = JSON.parse(clean);
  S.cache[lead.id] = result;
  return result;
}

// ── LOG TO FUB ──
async function logToFUB(id, action) {
  const msgs = {
    'Called - connected': 'NSC: Called — connected.',
    'Called - no answer': 'NSC: Called — no answer, left voicemail.',
    'Text sent':          'NSC: Text sent.',
    'Email sent':         'NSC: Email sent.',
    'Showing booked':     'NSC: Showing booked 🏡',
  };
  try { await fubPost('/notes', { personId: id, body: msgs[action]||`NSC: ${action}` }); }
  catch(e) { console.warn('Note log failed', e.message); }
}

// ── RENDER ──
function render() {
  document.getElementById('root').innerHTML = (S.ck && S.fk) ? renderApp() : renderSetup();
}

function renderSetup() {
  return `
  <div class="hdr">
    <div class="hdr-logo">🏡</div>
    <div><div class="hdr-title">Next Step Coach</div><div class="hdr-sub">Skylight Homes</div></div>
  </div>
  <div class="setup"><div class="card">
    <div style="font-size:36px;margin-bottom:14px">🔑</div>
    <h2>Connect Your Account</h2>
    <p>Enter your API keys below. They save to your browser only — never sent anywhere except directly to FUB and Anthropic.</p>
    <div class="field"><label>Follow Up Boss API Key</label>
      <input type="password" id="fk" placeholder="fka_..." autocomplete="off"></div>
    <div class="field"><label>Claude (Anthropic) API Key</label>
      <input type="password" id="ck" placeholder="sk-ant-..." autocomplete="off"></div>
    <button class="btn-full" onclick="saveKeys()">Connect & Load Leads →</button>
    <p class="note">FUB key needs People + Notes read/write. Find it in FUB → Admin → API.</p>
  </div></div>`;
}

function renderApp() {
  const crit  = S.leads.filter(l => l.daysSince >= 14).length;
  const high  = S.leads.filter(l => l.daysSince >= 7 && l.daysSince < 14).length;
  const fresh = S.leads.filter(l => l.daysSince < 3).length;
  return `
  <div class="hdr">
    <div class="hdr-logo">🏡</div>
    <div><div class="hdr-title">Next Step Coach</div><div class="hdr-sub">Skylight Homes · ${S.leads.length} leads</div></div>
    <div class="hdr-right">
      <button class="btn-sm btn-outline" onclick="clearKeys()">⚙ Keys</button>
      <button class="btn-sm btn-green" onclick="loadLeads()">↻ Refresh</button>
    </div>
  </div>
  <div class="scroll"><div class="body">
    ${S.err ? `<div class="errbar">⚠️ ${S.err}</div>` : ''}
    ${S.loading
      ? `<div class="empty"><span class="spin"></span> Loading leads from Follow Up Boss…</div>`
      : `<div class="stats">
          <div class="stat"><div class="stat-l">Total</div><div class="stat-v">${S.leads.length}</div></div>
          <div class="stat"><div class="stat-l">Critical (14d+)</div><div class="stat-v r">${crit}</div></div>
          <div class="stat"><div class="stat-l">Needs Attn</div><div class="stat-v o">${high}</div></div>
          <div class="stat"><div class="stat-l">Fresh (≤3d)</div><div class="stat-v g">${fresh}</div></div>
         </div>
         <div class="leads">
           ${S.leads.length
             ? S.leads.map(renderCard).join('')
             : `<div class="empty"><div class="ico">🔍</div><h3>No leads found</h3><p>Make sure your FUB API key has People read access.</p></div>`}
         </div>`}
  </div></div>`;
}

const COLS = ['#1D9E75','#085041','#2563eb','#7c3aed','#db2777','#d97706','#059669'];
function avi(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%COLS.length; return COLS[h]; }
function ini(n){ return n.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase(); }
function urg(d){ return d>=14?'critical':d>=7?'high':d>=3?'medium':'low'; }

function renderCard(l) {
  const open = S.open === l.id;
  const coaching = S.cache[l.id];
  const u = coaching?.urgency || urg(l.daysSince);
  const uLbl = {critical:'Critical',high:'High Priority',medium:'Follow Up',low:'On Track'};
  const dc = l.daysSince>=14?'b-c':l.daysSince>=7?'b-w':'b-ok';
  const dl = l.daysSince===999?'Never contacted':`${l.daysSince}d ago`;
  return `
  <div class="lcard ${open?'open':''}" id="c${l.id}">
    <div class="lhdr" onclick="toggle('${l.id}')">
      <div class="avi" style="background:${avi(l.name)}">${ini(l.name)}</div>
      <div class="linfo">
        <div class="lname">${l.name}</div>
        <div class="lmeta">${l.stage} · ${l.source}</div>
        <div class="bgs">
          <span class="b b-s">${l.stage}</span>
          <span class="b b-src">${l.source}</span>
          <span class="b ${dc}">${dl}</span>
        </div>
      </div>
      <div class="upill ${u}"><span class="udot"></span>${uLbl[u]}</div>
      <span class="chev">▾</span>
    </div>
    ${open ? renderCoach(l, coaching) : ''}
  </div>`;
}

function renderCoach(l, c) {
  if (!c) return `<div class="cbody"><div class="cload"><span class="spin"></span>Coach is analyzing ${l.name}…</div></div>`;
  const u = c.urgency||'medium';
  const icons = {critical:'🚨',high:'⚡',medium:'📋',low:'✅'};
  const tab = S.stab[l.id]||'text';
  const script = c.scripts?.[tab]||'';
  const logged = S.logs[l.id]||new Set();
  return `
  <div class="cbody">
    <div class="cc">
      <div class="ubanner ${u}">
        <span class="ui">${icons[u]}</span>
        <div class="ut"><strong>${c.urgencyReason||''}</strong>${c.summary||''}</div>
      </div>
      <div class="slbl">Your Next Steps — In Order</div>
      <div class="steps">
        ${(c.steps||[]).map((s,i)=>`
          <div class="step">
            <div class="snum">${i+1}</div>
            <div class="stxt"><strong>${s.action}</strong><span>${s.why}</span></div>
          </div>`).join('')}
      </div>
      <div class="slbl">Scripts Ready to Send</div>
      <div class="stabs">
        ${['text','email','voicemail'].map(t=>`<button class="stab ${tab===t?'on':''}" onclick="setTab('${l.id}','${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
      </div>
      <div class="sbox" id="sb${l.id}">
        <button class="cpybtn" id="cp${l.id}" onclick="doCopy('${l.id}')">Copy</button>
        <span id="st${l.id}">${script.replace(/\n/g,'<br>')}</span>
      </div>
    </div>
    <div class="logbar">
      <div class="log-lbl">Log what you did — writes back to FUB as a note</div>
      <div class="logbtns" id="lb${l.id}">${renderLogBtns(l.id, logged)}</div>
    </div>
  </div>`;
}

function renderLogBtns(id, logged) {
  return ['Called - connected','Called - no answer','Text sent','Email sent','Showing booked'].map(a=>`
    <button class="lbtn ${logged.has(a)?'done':''}" onclick="logAct('${id}','${a}')" ${logged.has(a)?'disabled':''}>
      ${logged.has(a)?'✓ ':''}${a}
    </button>`).join('');
}

// ── EVENTS ──
function saveKeys() {
  const fk = document.getElementById('fk')?.value.trim();
  const ck = document.getElementById('ck')?.value.trim();
  if (!fk||!ck){ alert('Please enter both keys.'); return; }
  S.fk=fk; S.ck=ck;
  localStorage.setItem('nsc_fk',fk); localStorage.setItem('nsc_ck',ck);
  loadLeads();
}
function clearKeys() {
  if (!confirm('Clear saved keys?')) return;
  localStorage.removeItem('nsc_fk'); localStorage.removeItem('nsc_ck');
  Object.assign(S, {fk:'',ck:'',leads:[],cache:{},open:null}); render();
}
async function toggle(id) {
  if (S.open===id){ S.open=null; render(); return; }
  S.open=id; render();
  if (!S.cache[id]) {
    const lead = S.leads.find(l=>l.id==id);
    if (!lead) return;
    try { await getCoaching(lead); }
    catch(e) {
      S.cache[id]={
        urgency: urg(lead.daysSince),
        urgencyReason:'Could not load AI coaching — check your Claude API key.',
        summary: e.message,
        steps:[{action:'Check Claude API key',why:'Claude returned an error.'}],
        scripts:{text:'',email:'',voicemail:''},
      };
    }
    render();
  }
}
function setTab(id, tab) {
  S.stab[id]=tab;
  const el=document.getElementById('st'+id);
  const c=S.cache[id];
  if (el&&c) el.innerHTML=(c.scripts?.[tab]||'').replace(/\n/g,'<br>');
  document.querySelectorAll(`#c${id} .stab`).forEach(b=>{
    b.classList.toggle('on', b.textContent.toLowerCase().trim()===tab);
  });
}
async function doCopy(id) {
  const tab=S.stab[id]||'text';
  const txt=S.cache[id]?.scripts?.[tab]||'';
  try { await navigator.clipboard.writeText(txt); }
  catch { const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
  const b=document.getElementById('cp'+id);
  if(b){b.textContent='Copied!';b.classList.add('done');setTimeout(()=>{b.textContent='Copy';b.classList.remove('done');},2000);}
}
async function logAct(id, action) {
  if (!S.logs[id]) S.logs[id]=new Set();
  S.logs[id].add(action);
  await logToFUB(id, action);
  const el=document.getElementById('lb'+id);
  if(el) el.innerHTML=renderLogBtns(id, S.logs[id]);
}

// ── BOOT ──
if (S.ck && S.fk) loadLeads(); else render();
</script>
</body>
